<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" fill="none" role="img" aria-label="EventorHub">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#05070f"/><stop offset="1" stop-color="#0a1122"/></linearGradient>
    <radialGradient id="gl" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#818cf8" stop-opacity="0.5"/><stop offset="1" stop-color="#818cf8" stop-opacity="0"/></radialGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#818cf8"/></linearGradient>
    <filter id="gw" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.t{font-family:'Segoe UI',Arial,sans-serif;font-weight:800;}.s{font-family:'Segoe UI',Arial,sans-serif;font-weight:600;}.c{font-family:'Consolas',monospace;}</style>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <ellipse cx="950" cy="180" rx="420" ry="280" fill="url(#gl)"/>
  <g stroke="#1e2b45" stroke-width="1" opacity="0.5"><path d="M0 90 H1200 M0 180 H1200 M0 270 H1200"/><path d="M300 0 V360 M600 0 V360 M900 0 V360"/></g>
  <rect x="60" y="70" width="1080" height="220" rx="24" fill="#ffffff" fill-opacity="0.05" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- calendar/chart icon -->
  <g transform="translate(120,118)" filter="url(#gw)">
    <rect x="0" y="14" width="120" height="120" rx="14" fill="none" stroke="url(#ac)" stroke-width="4"/>
    <path d="M0 46 H120" stroke="url(#ac)" stroke-width="4"/>
    <path d="M30 0 V26 M90 0 V26" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
    <rect x="24" y="90" width="14" height="28" rx="3" fill="#38bdf8"/>
    <rect x="52" y="74" width="14" height="44" rx="3" fill="#7dd3fc"/>
    <rect x="80" y="62" width="14" height="56" rx="3" fill="#818cf8"/>
  </g>
  <text x="290" y="150" class="t" font-size="46" fill="#ffffff" filter="url(#gw)">EventorHub</text>
  <text x="292" y="192" class="s" font-size="21" fill="#a5b4fc">Event Management Platform with Payments &amp; Analytics</text>
  <g class="c" font-size="15" fill="#cbd5e1">
    <rect x="292" y="216" width="82" height="30" rx="15" fill="#818cf8" fill-opacity="0.12" stroke="#818cf8" stroke-opacity="0.35"/><text x="333" y="236" text-anchor="middle">Flask</text>
    <rect x="384" y="216" width="90" height="30" rx="15" fill="#818cf8" fill-opacity="0.12" stroke="#818cf8" stroke-opacity="0.35"/><text x="429" y="236" text-anchor="middle">SQLite</text>
    <rect x="484" y="216" width="106" height="30" rx="15" fill="#818cf8" fill-opacity="0.12" stroke="#818cf8" stroke-opacity="0.35"/><text x="537" y="236" text-anchor="middle">Chart.js</text>
    <rect x="600" y="216" width="110" height="30" rx="15" fill="#818cf8" fill-opacity="0.12" stroke="#818cf8" stroke-opacity="0.35"/><text x="655" y="236" text-anchor="middle">Razorpay</text>
    <rect x="720" y="216" width="80" height="30" rx="15" fill="#818cf8" fill-opacity="0.12" stroke="#818cf8" stroke-opacity="0.35"/><text x="760" y="236" text-anchor="middle">SMTP</text>
  </g>
</svg>
