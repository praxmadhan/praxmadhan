<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" fill="none" role="img" aria-label="Portfolio Website">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#05070f"/><stop offset="1" stop-color="#0a1122"/></linearGradient>
    <radialGradient id="gl" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#22d3ee" stop-opacity="0.5"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#818cf8"/></linearGradient>
    <filter id="gw" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.t{font-family:'Segoe UI',Arial,sans-serif;font-weight:800;}.s{font-family:'Segoe UI',Arial,sans-serif;font-weight:600;}.c{font-family:'Consolas',monospace;}</style>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <ellipse cx="950" cy="180" rx="420" ry="280" fill="url(#gl)"/>
  <g stroke="#1e2b45" stroke-width="1" opacity="0.5"><path d="M0 90 H1200 M0 180 H1200 M0 270 H1200"/><path d="M300 0 V360 M600 0 V360 M900 0 V360"/></g>
  <rect x="60" y="70" width="1080" height="220" rx="24" fill="#ffffff" fill-opacity="0.05" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- browser/globe icon -->
  <g transform="translate(120,120)" filter="url(#gw)">
    <rect x="0" y="10" width="120" height="120" rx="16" fill="none" stroke="url(#ac)" stroke-width="4"/>
    <circle cx="60" cy="72" r="42" fill="none" stroke="#38bdf8" stroke-width="3.5"/>
    <path d="M18 72 H102 M60 30 C42 48 42 96 60 114 M60 30 C78 48 78 96 60 114" fill="none" stroke="#38bdf8" stroke-width="3"/>
  </g>
  <text x="290" y="150" class="t" font-size="46" fill="#ffffff" filter="url(#gw)">Portfolio Website</text>
  <text x="292" y="192" class="s" font-size="21" fill="#7dd3fc">Personal Developer Portfolio &#8226; AI Chatbot &#8226; Custom Domain</text>
  <g class="c" font-size="15">
    <rect x="292" y="216" width="360" height="32" rx="16" fill="#22d3ee" fill-opacity="0.14" stroke="#22d3ee" stroke-opacity="0.5"/>
    <circle cx="312" cy="232" r="5" fill="#22d3ee"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/></circle>
    <text x="328" y="237" fill="#e0f2fe">LIVE &#8594; www.prasannainfo.website</text>
  </g>
</svg>
