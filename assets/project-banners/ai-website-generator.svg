<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" fill="none" role="img" aria-label="AI Business Website Generator">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#05070f"/><stop offset="1" stop-color="#0a1122"/></linearGradient>
    <radialGradient id="gl" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#38bdf8" stop-opacity="0.5"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/></radialGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#818cf8"/></linearGradient>
    <filter id="gw" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.t{font-family:'Segoe UI',Arial,sans-serif;font-weight:800;}.s{font-family:'Segoe UI',Arial,sans-serif;font-weight:600;}.c{font-family:'Consolas',monospace;}</style>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <ellipse cx="950" cy="180" rx="420" ry="280" fill="url(#gl)"/>
  <g stroke="#1e2b45" stroke-width="1" opacity="0.5"><path d="M0 90 H1200 M0 180 H1200 M0 270 H1200"/><path d="M300 0 V360 M600 0 V360 M900 0 V360"/></g>
  <rect x="60" y="70" width="1080" height="220" rx="24" fill="#ffffff" fill-opacity="0.05" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- AI spark/node icon -->
  <g transform="translate(126,120)" filter="url(#gw)">
    <circle cx="60" cy="70" r="16" fill="none" stroke="url(#ac)" stroke-width="4"/>
    <g stroke="#38bdf8" stroke-width="3.5">
      <line x1="60" y1="70" x2="18" y2="24"/><line x1="60" y1="70" x2="104" y2="24"/>
      <line x1="60" y1="70" x2="10" y2="112"/><line x1="60" y1="70" x2="112" y2="112"/>
    </g>
    <g fill="#818cf8">
      <circle cx="18" cy="24" r="8"/><circle cx="104" cy="24" r="8"/><circle cx="10" cy="112" r="8"/><circle cx="112" cy="112" r="8"/>
    </g>
    <circle cx="60" cy="70" r="24" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"><animate attributeName="r" values="18;30;18" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/></circle>
  </g>
  <text x="290" y="146" class="t" font-size="42" fill="#ffffff" filter="url(#gw)">AI Business Website Generator</text>
  <text x="292" y="188" class="s" font-size="21" fill="#7dd3fc">Generate modern business websites from minimal input</text>
  <g class="c" font-size="15" fill="#cbd5e1">
    <rect x="292" y="214" width="120" height="30" rx="15" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.35"/><text x="352" y="234" text-anchor="middle">AI Agents</text>
    <rect x="422" y="214" width="80" height="30" rx="15" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.35"/><text x="462" y="234" text-anchor="middle">LLMs</text>
    <rect x="512" y="214" width="80" height="30" rx="15" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.35"/><text x="552" y="234" text-anchor="middle">React</text>
    <rect x="602" y="214" width="80" height="30" rx="15" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.35"/><text x="642" y="234" text-anchor="middle">AWS</text>
    <rect x="692" y="214" width="150" height="30" rx="15" fill="#22d3ee" fill-opacity="0.14" stroke="#22d3ee" stroke-opacity="0.5"/><text x="767" y="234" text-anchor="middle" fill="#e0f2fe">Coming Soon</text>
  </g>
</svg>
