<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396" fill="none" role="img" aria-label="Prasanna N LinkedIn banner">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="1584" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070f"/>
      <stop offset="0.55" stop-color="#0a1122"/>
      <stop offset="1" stop-color="#04060d"/>
    </linearGradient>
    <radialGradient id="lb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.5"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="li" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.5"/><stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lacc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="lglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .t{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;font-weight:800;}
      .s{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;font-weight:600;}
      .mn{font-family:'Consolas','Menlo',monospace;}
    </style>
  </defs>
  <rect width="1584" height="396" fill="url(#lbg)"/>
  <ellipse cx="300" cy="120" rx="500" ry="300" fill="url(#li)"/>
  <ellipse cx="1300" cy="330" rx="520" ry="320" fill="url(#lb)"/>
  <g stroke="#1e2b45" stroke-width="1" opacity="0.5">
    <path d="M0 100 H1584 M0 200 H1584 M0 300 H1584"/>
    <path d="M300 0 V396 M700 0 V396 M1100 0 V396 M1400 0 V396"/>
  </g>
  <g stroke="url(#lacc)" stroke-width="2" fill="none" opacity="0.65">
    <path d="M0 150 H180 L210 120 H520"/>
    <path d="M1584 250 H1300 L1270 280 H960"/>
  </g>
  <g fill="#38bdf8">
    <circle cx="210" cy="120" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1270" cy="280" r="4"><animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/></circle>
  </g>
  <rect x="150" y="120" width="8" height="150" rx="4" fill="url(#lacc)"/>
  <text x="190" y="180" class="t" font-size="58" fill="#ffffff" filter="url(#lglow)">Prasanna N</text>
  <text x="192" y="228" class="s" font-size="25" fill="#7dd3fc">Software Engineer &#8226; Full Stack Developer &#8226; AI Engineer</text>
  <text x="192" y="272" class="mn" font-size="18" fill="#94a3b8">Building AI-powered applications &amp; intelligent automation</text>
  <g transform="translate(1300,138)">
    <rect width="130" height="130" rx="28" fill="#ffffff" fill-opacity="0.06" stroke="url(#lacc)" stroke-width="2"/>
    <rect width="130" height="130" rx="28" fill="url(#lb)" opacity="0.5"/>
    <text x="65" y="86" text-anchor="middle" class="t" font-size="62" fill="#ffffff" filter="url(#lglow)">PN</text>
  </g>
