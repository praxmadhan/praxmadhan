<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" fill="none" role="img" aria-label="Prasanna N — Software Engineer, Full Stack Developer, AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070f"/>
      <stop offset="0.5" stop-color="#0a1122"/>
      <stop offset="1" stop-color="#04060d"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowIndigo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-weight: 800; }
      .sub   { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; }
      .mono  { font-family: 'SFMono-Regular', 'Consolas', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <ellipse cx="330" cy="120" rx="520" ry="340" fill="url(#glowIndigo)"/>
  <ellipse cx="1200" cy="420" rx="560" ry="360" fill="url(#glowBlue)"/>

  <!-- circuit grid -->
  <g stroke="#1e2b45" stroke-width="1" opacity="0.55">
    <path d="M0 90 H1500 M0 200 H1500 M0 310 H1500 M0 420 H1500"/>
    <path d="M150 0 V500 M400 0 V500 M650 0 V500 M900 0 V500 M1150 0 V500 M1350 0 V500"/>
  </g>
  <g stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.7">
    <path d="M0 200 H120 L150 170 H400"/>
    <path d="M1500 310 H1250 L1220 340 H900"/>
    <path d="M150 500 V420 L180 390 V310"/>
  </g>
  <g fill="#38bdf8">
    <circle cx="150" cy="170" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="1220" cy="340" r="4"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="390" r="4"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="170" r="3.5" fill="#818cf8"/>
    <circle cx="900" cy="340" r="3.5" fill="#818cf8"/>
  </g>

  <!-- glass card -->
  <g filter="url(#soft)"><rect x="90" y="120" width="1320" height="260" rx="28" fill="#38bdf8" opacity="0.10"/></g>
  <rect x="96" y="126" width="1308" height="248" rx="26" fill="url(#glass)" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="96" y="126" width="1308" height="248" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- accent bar -->
  <rect x="140" y="176" width="6" height="148" rx="3" fill="url(#accent)"/>

  <!-- text -->
  <text x="176" y="222" class="title" font-size="62" fill="#ffffff" filter="url(#glow)">Prasanna N</text>
  <text x="178" y="272" class="sub" font-size="27" fill="#7dd3fc" letter-spacing="1">Software Engineer &#160;&#8226;&#160; Full Stack Developer &#160;&#8226;&#160; AI Engineer</text>
  <text x="178" y="316" class="mono" font-size="19" fill="#94a3b8">&gt; Building AI-powered applications &amp; scalable web software</text>

  <!-- pill -->
  <g>
    <rect x="178" y="336" width="290" height="30" rx="15" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.4"/>
    <circle cx="198" cy="351" r="4" fill="#22d3ee"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/></circle>
    <text x="214" y="356" class="mono" font-size="15" fill="#cbd5e1">www.prasannainfo.website</text>
  </g>

  <!-- right monogram chip -->
  <g transform="translate(1170,180)">
    <rect x="0" y="0" width="150" height="150" rx="30" fill="url(#glass)" stroke="url(#accent)" stroke-width="2"/>
    <rect x="0" y="0" width="150" height="150" rx="30" fill="url(#glowBlue)" opacity="0.5"/>
    <text x="75" y="98" text-anchor="middle" class="title" font-size="72" fill="#ffffff" filter="url(#glow)">PN</text>
  </g>
</svg>
